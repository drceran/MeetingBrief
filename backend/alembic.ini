[alembic]
# path to migration scripts
script_location = alembic

# sqlalchemy.url may be overridden in env.py or via environment.
# Update this to match your database (sync driver) or set via env.
sqlalchemy.url = postgresql://postgres:password@localhost:5432/meetingbrief

# file template used for new revision file names
file_template = %(rev)s_%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
